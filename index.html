<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassConnect | Iniciar Sessão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark-navy: #0d1b2a;
            --medium-blue: #1b263b;
            --accent-teal: #38b6ff;
            --accent-green: #52b788;
            --text-light: #e0e1dd;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-navy);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Lado Esquerdo: Formulário de Login */
        .login-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 2;
            background: linear-gradient(145deg, #0d1b2a 0%, #16213e 100%);
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 30px;
        }

        /* Simulação da tua logo via CSS */
        .logo-icon {
            font-size: 3rem;
            color: var(--accent-teal);
            margin-bottom: 10px;
            display: inline-block;
            background: linear-gradient(to bottom right, var(--accent-teal), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -1px;
        }

        .logo-text span {
            color: var(--accent-teal);
        }

        .tagline {
            color: #8d99ae;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        /* Campos de Entrada */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: var(--text-light);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-teal);
            background: rgba(255, 255, 255, 0.1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.85rem;
        }

        .options a {
            color: var(--accent-teal);
            text-decoration: none;
        }

        /* Botões */
        .btn-primary {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(to right, #219ebc, #023047);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 182, 255, 0.2);
        }

        .divider {
            margin: 25px 0;
            color: #555;
            position: relative;
        }

        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #333;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .btn-google {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 10px;
            background: transparent;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Lado Direito: Imagem e Conteúdo Visual */
        .image-section {
            flex: 1.2;
            position: relative;
            background: url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1950&q=80');
            background-size: cover;
            background-position: center;
        }

        .image-section::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, var(--dark-navy), transparent);
        }

        .image-content {
            position: absolute;
            bottom: 60px;
            left: 60px;
            right: 60px;
            color: white;
        }

        .image-content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .image-content p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Responsividade */
        @media (max-width: 900px) {
            .image-section { display: none; }
            .login-section { background: var(--dark-navy); }
        }
    </style>
</head>
<body>

    <main class="login-section">
        <div class="login-box">
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-book-open"></i>
                </div>
                <h1 class="logo-text">Class<span>Connect</span></h1>
                <p class="tagline">Aprender Juntos</p>
            </div>

            <form>
                <div class="form-group">
                    <label for="email">E-mail ou Utilizador</label>
                    <input type="text" id="email" placeholder="nome@exemplo.com">
                </div>

                <div class="form-group">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <div class="options">
                    <label style="color: #8d99ae;">
                        <input type="checkbox" style="width: auto; margin-right: 5px;"> Lembrar-me
                    </label>
                    <a href="#">Esqueceu-se da senha?</a>
                </div>

                <button type="button" class="btn-primary">Iniciar Sessão</button>

                <div class="divider">ou</div>

                <button type="button" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" alt="Google">
                    Entrar com o Google
                </button>
            </form>

            <p style="margin-top: 40px; color: #8d99ae; font-size: 0.9rem;">
                Ainda não tem conta? <a href="#" style="color: var(--accent-teal); text-decoration: none; font-weight: bold;">Registe-se aqui</a>
            </p>
        </div>
    </main>

    <aside class="image-section">
        <div class="image-content">
            <h2>Transforma a tua forma de aprender.</h2>
            <p>Junta-te a milhares de estudantes e organiza o teu futuro académico num só lugar.</p>
        </div>
    </aside>

</body>
</html>
