<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ClassConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark-navy: #0f172a;
            --primary-blue: #3498db;
            --accent-green: #2ecc71;
            --text-light: #f8fafc;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--dark-navy);
            height: 100vh;
            display: flex;
            overflow: hidden;
            color: var(--text-light);
        }

        .login-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 2;
        }

        .login-box { width: 100%; max-width: 400px; }

        .brand { text-align: center; margin-bottom: 40px; }

        .logo-img {
            width: 85px;
            height: 85px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-green));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .brand h1 {
            font-size: 2.2rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p { color: #64748b; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; margin-top: 5px; }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #94a3b8; }

        input {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary-blue); background: rgba(255, 255, 255, 0.08); }

        .btn-entrar {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, var(--primary-blue), #2980b9);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }

        .btn-entrar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); }

        .divider { margin: 25px 0; text-align: center; position: relative; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(255, 255, 255, 0.1); }
        .divider span { background: var(--dark-navy); padding: 0 15px; position: relative; color: #64748b; font-size: 0.8rem; }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .image-container {
            flex: 1.2;
            position: relative;
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
        }

        .image-container::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to right, var(--dark-navy), transparent); }

        @media (max-width: 900px) { .image-container { display: none; } }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-box">
            <div class="brand">
                <div class="logo-img">
                    <i class="fas fa-graduation-cap fa-3x" style="color: white;"></i>
                </div>
                <h1>ClassConnect</h1>
                <p>Aprender Juntos</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>E-mail ou Usuário</label>
                    <input type="text" id="email" placeholder="seuemail@exemplo.com" required>
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-entrar">Entrar</button>

                <div class="divider"><span>ou</span></div>

                <button type="button" class="btn-google" onclick="simularGoogle()">
                    <i class="fab fa-google"></i>
                    Entrar com o Google
                </button>
            </form>

            <p style="text-align: center; margin-top: 30px; color: #64748b; font-size: 0.9rem;">
                Novo por aqui? <a href="#" style="color: var(--accent-green); text-decoration: none; font-weight: 600;">Criar conta</a>
            </p>
        </div>
    </div>

    <div class="image-container"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Impede a página de recarregar
            
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(email && pass) {
                alert('Login realizado com sucesso! Bem-vindo ao ClassConnect, ' + email);
                // Aqui você pode redirecionar para outra página se quiser:
                // window.location.href = "landing-page.html";
            }
        });

        function simularGoogle() {
            alert('Conectando com o Google...');
            setTimeout(() => {
                alert('Conta Google vinculada com sucesso!');
            }, 1000);
        }
    </script>

</body>
</html>
